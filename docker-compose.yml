services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tripnow
      POSTGRES_PASSWORD: tripnow
      POSTGRES_DB: tripnow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripnow"]
      interval: 5s
      timeout: 3s
      retries: 5

  tripnow-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__TripNowDb=Host=postgres;Port=5432;Database=tripnow;Username=tripnow;Password=tripnow
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
